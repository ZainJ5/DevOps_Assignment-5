name: Staging Environment CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies & Lint/Test
        working-directory: ./frontend
        run: |
          npm install
          npm run lint --if-present
          npm test -- --passWithNoTests

      - name: Install Backend Dependencies & Lint/Test
        working-directory: ./backend
        run: |
          npm install
          npm run lint --if-present
          npm test -- --passWithNoTests

  deploy-to-staging:
    needs: build-test-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Deployment Files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_STAGING_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml" 
          target: "~/DevOps_Assignment-5"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/frontend:latest ./frontend
          docker push $ECR_REGISTRY/frontend:latest
          docker build -t $ECR_REGISTRY/backend:latest ./backend
          docker push $ECR_REGISTRY/backend:latest

      - name: Deploy to Staging EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        with:
          host: ${{ secrets.EC2_STAGING_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,DB_USER,DB_PASSWORD,DB_NAME
          script: |
            cd ~/DevOps_Assignment-5
            
            # Create/Overwrite .env file so docker-compose can read the variables
            echo "ECR_REGISTRY=${ECR_REGISTRY}" > .env
            echo "DB_USER=${DB_USER}" >> .env
            echo "DB_PASSWORD=${DB_PASSWORD}" >> .env
            echo "DB_NAME=${DB_NAME}" >> .env
            
            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
            
            # Pull and Update
            docker compose pull
            docker compose up -d --force-recreate

  notify:
    needs: [build-test-lint, deploy-to-staging]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Staging Pipeline Status - ${{ needs.deploy-to-staging.result }}
          to: zainjamshaid55@gmail.com, sajid.ali@giki.edu.pk 
          from: GitHub Actions
          body: |
            The Staging Pipeline workflow resulted in: ${{ needs.deploy-to-staging.result }}.
